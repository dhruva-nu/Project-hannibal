server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    # AI tutor (CopilotKit / AG-UI) streams responses over SSE. Disable
    # response buffering and lift the read timeout so long replies are not
    # truncated mid-stream by the proxy.
    location /api/v1/copilotkit {
        proxy_pass http://backend:8000/api/v1/copilotkit;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        chunked_transfer_encoding on;
    }

    # Proxy API requests to the backend service
    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Serve the React app for all other routes (client-side routing)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
