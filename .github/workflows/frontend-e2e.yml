name: E2E Smoke Tests

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - 'backend/**'
      - 'rce-service/**'
      - '.github/workflows/frontend-e2e.yml'
  pull_request:
    branches: [main]
    paths:
      - 'frontend/**'
      - 'backend/**'
      - 'rce-service/**'
      - '.github/workflows/frontend-e2e.yml'

jobs:
  e2e:
    name: Playwright golden path
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # The compose stack reads .env for every service. These are throwaway
      # credentials for an ephemeral CI stack — the Postgres healthcheck hardcodes
      # user/db "hannibal", so those must match.
      - name: Write CI .env
        run: |
          cat > .env <<'EOF'
          POSTGRES_USER=hannibal
          POSTGRES_PASSWORD=hannibal
          POSTGRES_DB=hannibal
          DATABASE_URL=postgresql://hannibal:hannibal@db:5432/hannibal
          MONGO_USER=hannibal
          MONGO_PASSWORD=hannibal
          MONGO_DB=hannibal
          MONGO_URL=mongodb://hannibal:hannibal@mongo:27017
          APP_NAME=hannibal-ci
          API_PREFIX=/api/v1
          HOST=0.0.0.0
          PORT=8000
          RELOAD=false
          SECRET_KEY=ci-secret-not-for-production
          JWT_ALGORITHM=HS256
          ACCESS_TOKEN_EXPIRE_MINUTES=15
          COOKIE_SECURE=false
          FRONTEND_ORIGIN=http://localhost:5173
          VITE_COPILOTKIT_RUNTIME_URL=http://backend:8000/api/v1/copilotkit
          DSL_SERVICE_URL=http://dsl-service:9000
          RABBITMQ_USER=hannibal
          RABBITMQ_PASSWORD=hannibal
          RABBITMQ_URL=amqp://hannibal:hannibal@rabbitmq:5672/
          RCE_RPC_TIMEOUT_SECONDS=150
          RCE_STREAM_IDLE_TIMEOUT_SECONDS=150
          PREWARM_ON_START=false
          GEMINI_API_KEY=ci-not-used
          LLM_PROVIDER=gemini
          LOG=false
          ENV=ci
          EOF

      # rce-service mounts the host Docker socket to spawn sandbox containers, so
      # the runner itself is the Docker-in-Docker host — no extra service needed.
      - name: Start the stack
        run: docker compose up -d --build --wait

      - name: Wait for backend and frontend
        run: |
          for url in http://localhost:8000/api/v1/health/ http://localhost:5173; do
            echo "waiting for $url"
            for i in $(seq 1 60); do
              if curl -fsS "$url" >/dev/null 2>&1; then echo "ready: $url"; break; fi
              if [ "$i" -eq 60 ]; then echo "timed out waiting for $url"; exit 1; fi
              sleep 3
            done
          done

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: backend/uv.lock

      - name: Install backend deps (for the seed script)
        working-directory: backend
        run: uv sync --all-groups

      # Seed runs on the host against the published DB ports. The exported URLs
      # win over .env because config.py loads it with override=False.
      - name: Seed the database
        working-directory: backend
        env:
          DATABASE_URL: postgresql://hannibal:hannibal@localhost:5432/hannibal
          MONGO_URL: mongodb://hannibal:hannibal@localhost:27017
          MONGO_DB: hannibal
        run: uv run python ../scripts/seed.py

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install frontend deps
        working-directory: frontend
        run: bun install --frozen-lockfile

      - name: Install Playwright browser
        working-directory: frontend
        run: bunx playwright install --with-deps chromium

      - name: Run Playwright smoke tests
        working-directory: frontend
        env:
          CI: "true"
        run: bun run test:e2e

      - name: Dump stack logs on failure
        if: failure()
        run: docker compose logs --no-color

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7
