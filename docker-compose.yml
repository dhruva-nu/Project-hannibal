services:

  # ── Postgres ──────────────────────────────────────────────────────────────
  db:
    # Pinned to a specific pgvector release on Postgres 17. Bump deliberately:
    # check https://hub.docker.com/r/pgvector/pgvector/tags for a newer
    # <pgvector>-pg17 tag, then update this line and test migrations.
    image: pgvector/pgvector:0.8.4-pg17
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"                    
    volumes:
      - db_data:/var/lib/postgresql/data          
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hannibal -d hannibal"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Backend ───────────────────────────────────────────────────────────────
  backend:
    build: ./backend                   # Points to backend/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      DSL_SERVICE_URL: http://dsl-service:9000
      RABBITMQ_URL: amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq:5672/
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy     # Wait for Postgres to be ready before starting.
      rabbitmq:
        condition: service_healthy     # RCE calls travel over the broker.
      dsl-service:
        condition: service_started
        required: false

  # ── RabbitMQ ─────────────────────────────────────────────────────────────
  rabbitmq:
    # Pinned to a specific patch. Bump deliberately: check
    # https://hub.docker.com/_/rabbitmq/tags for a newer
    # <version>-management-alpine tag, then update this line.
    image: rabbitmq:4.3.2-management-alpine
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    ports:
      - "5672:5672"                    # AMQP
      - "15672:15672"                  # management UI
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── RCE Service ─────────────────────────────────────────────────────────────
  # The Docker-sandboxed code runner. Consumes jobs from RabbitMQ and runs
  # untrusted student code in throwaway containers on the host daemon — so the
  # socket is mounted HERE, not into the internet-facing backend.
  # Must stay at a single replica: the install queue's per-language writer lock
  # is in-process (see hannibal-vault/features/code-execution.md).
  rce-service:
    build: ./rce-service
    restart: unless-stopped
    environment:
      RABBITMQ_URL: amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq:5672/
      PREWARM_ON_START: ${PREWARM_ON_START:-false}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      # Read-only view of the package caches so the install queue can check
      # .installed/<pkg> markers without starting a container. Only the
      # sandboxed installer ever mounts these read-write.
      - rce-cache-python:/opt/rce-cache/python:ro
      - rce-cache-node:/opt/rce-cache/node:ro
    depends_on:
      rabbitmq:
        condition: service_healthy

  # ── MongoDB ───────────────────────────────────────────────────────────────
  mongo:
    # Pinned to a specific patch. Bump deliberately: check
    # https://hub.docker.com/_/mongo/tags for a newer 8.0.x tag,
    # then update this line.
    image: mongo:8.0.26
    restart: unless-stopped
    env_file: .env
    command: ["mongod", "--quiet"]
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_DB}
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  # ── Frontend ──────────────────────────────────────────────────────────────
  frontend:
    build: ./frontend                  # Points to frontend/Dockerfile
    restart: unless-stopped
    ports:
      - "5173:80"
    environment:
      VITE_COPILOTKIT_RUNTIME_URL: http://backend:8000/api/v1/copilotkit
    depends_on:
      - backend

  # ── DSL Service ───────────────────────────────────────────────────────────────
  dsl-service:
    build: ./dsl-service
    restart: unless-stopped
    ports:
      - "9000:9000"

# ── Named volumes ─────────────────────────────────────────────────────────────
volumes:
  db_data:
  mongo_data:
  # Global RCE package caches. Fixed (un-prefixed) names: the backend drives the
  # host Docker daemon directly, so sandbox containers reference these by name.
  rce-cache-python:
    name: rce-cache-python
  rce-cache-node:
    name: rce-cache-node
