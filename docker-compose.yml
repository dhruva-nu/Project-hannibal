services:

  # ── Postgres ──────────────────────────────────────────────────────────────
  db:
    image: pgvector/pgvector:pg17
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"                    
    volumes:
      - db_data:/var/lib/postgresql/data          
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hannibal -d hannibal"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Backend ───────────────────────────────────────────────────────────────
  backend:
    build: ./backend                   # Points to backend/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      DSL_SERVICE_URL: http://dsl-service:9000
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy     # Wait for Postgres to be ready before starting.
      dsl-service:
        condition: service_started
        required: false

  # ── MongoDB ───────────────────────────────────────────────────────────────
  mongo:
    image: mongo:8
    restart: unless-stopped
    env_file: .env
    command: ["mongod", "--quiet"]
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_DB}
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  # ── Frontend ──────────────────────────────────────────────────────────────
  frontend:
    build: ./frontend                  # Points to frontend/Dockerfile
    restart: unless-stopped
    ports:
      - "5173:80"
    environment:
      VITE_COPILOTKIT_RUNTIME_URL: http://backend:8000/api/v1/copilotkit
    depends_on:
      - backend

  # ── DSL Service ───────────────────────────────────────────────────────────────
  dsl-service:
    build: ./dsl-service
    restart: unless-stopped
    ports:
      - "9000:9000"

# ── Named volumes ─────────────────────────────────────────────────────────────
volumes:
  db_data:
  mongo_data:
